name: Docker

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/docker/Dockerfile.ubuntu.clang.ossfuzz'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from Dockerfile
        id: version
        run: |
          version=$(grep -oP 'LABEL version="\K[^"]+' scripts/docker/Dockerfile.ubuntu.clang.ossfuzz)
          echo "tag=ghcr.io/${{ github.repository }}:ubuntu.clang.ossfuzz-${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tag does not already exist
        run: |
          if docker manifest inspect "${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "ERROR: ${{ steps.version.outputs.tag }} already exists. Bump 'LABEL version' in the Dockerfile."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: scripts/docker/Dockerfile.ubuntu.clang.ossfuzz
          push: true
          tags: ${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
